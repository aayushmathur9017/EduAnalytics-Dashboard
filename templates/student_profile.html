<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Student Profile</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="card shadow p-5">

        <h1 class="mb-4">

            {{ student.name }}

        </h1>

        <div class="row g-4">

            <div class="col-md-4">

                <div class="alert alert-primary">

                    <h5>Maths</h5>

                    <h2>{{ student.maths }}</h2>

                </div>

            </div>

            <div class="col-md-4">

                <div class="alert alert-success">

                    <h5>Science</h5>

                    <h2>{{ student.science }}</h2>

                </div>

            </div>

            <div class="col-md-4">

                <div class="alert alert-warning">

                    <h5>English</h5>

                    <h2>{{ student.english }}</h2>

                </div>

            </div>

            <div class="col-md-4">

                <div class="alert alert-dark">

                    <h5>Attendance</h5>

                    <h2>{{ student.attendance }}%</h2>

                </div>

            </div>

            <div class="col-md-4">

                <div class="alert alert-info">

                    <h5>Average</h5>

                    <h2>{{ average }}</h2>

                </div>

            </div>

            <div class="col-md-4">

                <div class="alert alert-danger">

                    <h5>Prediction</h5>

                    <h2>{{ prediction }}</h2>

                </div>

            </div>

        </div>

        <a
        href="/"
        class="btn btn-primary mt-4">

            Back Dashboard

        </a>

    </div>

</div>

</body>
</html>

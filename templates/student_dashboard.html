<!DOCTYPE html>

<html>

<head>

    <title>
        Student Dashboard
    </title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-5 shadow">

        <h1 class="mb-4">

            Welcome,
            {{ student.name }}

        </h1>

        <h3>
            Maths:
            {{ student.maths }}
        </h3>

        <h3>
            Science:
            {{ student.science }}
        </h3>

        <h3>
            English:
            {{ student.english }}
        </h3>

        <h3>
            Attendance:
            {{ student.attendance }}%
        </h3>

        <h3>
            Average:
            {{ average }}
        </h3>

        <h3>
            Prediction:
            {{ prediction }}
        </h3>

    </div>

</div>

</body>

</html>

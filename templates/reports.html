<!DOCTYPE html>

<html>

<head>

    <title>
        Reports
    </title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1 class="mb-5">

        Reports & Activities

    </h1>

    <a
    href="/export"
    class="btn btn-success me-3">

        Export Excel

    </a>

    <a
    href="/pdf_report"
    class="btn btn-primary">

        Download PDF

    </a>

    <div class="mt-5">

        <h3>
            Recent Activities
        </h3>

        <ul class="list-group">

            {% for activity in activities %}

            <li class="list-group-item">

                {{ activity.action }}

            </li>

            {% endfor %}

        </ul>

    </div>

</div>

</body>

</html>

<!DOCTYPE html>

<html>

<head>

    <title>
        Students
    </title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1 class="mb-4">

        Student Records

    </h1>

    <form
    action="/add"
    method="POST">

        <div class="row g-3 mb-5">

            <div class="col-md-3">

                <input
                type="text"
                name="name"
                class="form-control"
                placeholder="Name"
                required>

            </div>

            <div class="col-md-3">

                <input
                type="number"
                name="maths"
                class="form-control"
                placeholder="Maths"
                required>

            </div>

            <div class="col-md-3">

                <input
                type="number"
                name="science"
                class="form-control"
                placeholder="Science"
                required>

            </div>

            <div class="col-md-3">

                <button
                class="btn btn-success w-100">

                    Add Student

                </button>

            </div>

        </div>

    </form>

    <table class="table table-bordered">

        <thead class="table-dark">

            <tr>

                <th>Name</th>
                <th>Maths</th>
                <th>Science</th>

            </tr>

        </thead>

        <tbody>

            {% for student in students %}

            <tr>

                <td>
                    {{ student.name }}
                </td>

                <td>
                    {{ student.maths }}
                </td>

                <td>
                    {{ student.science }}
                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>

</html>
